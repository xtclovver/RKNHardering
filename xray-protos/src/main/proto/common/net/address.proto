syntax = "proto3";

package xray.common.net;
option csharp_namespace = "Xray.Common.Net";
option go_package = "github.com/xtls/xray-core/common/net";
option java_package = "com.xray.common.net";
option java_multiple_files = true;

message IPOrDomain {
  oneof address {
    bytes ip = 1;
    string domain = 2;
  }
}
