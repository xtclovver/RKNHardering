name: CI

env:
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  ANDROID_CMAKE_VERSION: "3.22.1"
  ANDROID_NDK_VERSION: "28.2.13676358"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set reproducible build timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platforms;android-36" \
            "platform-tools" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  temporary_export_docs:
    if: github.event_name == 'pull_request' && github.head_ref == 'tmp-translate-docs-20260720-kai'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Pack documentation snapshot
        run: |
          tar -czf repo-docs.tar.gz docs
          find docs -type f -print0 | sort -z | xargs -0 sha256sum > docs-SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: temporary-repo-docs-snapshot
          path: |
            repo-docs.tar.gz
            docs-SHA256SUMS.txt
          retention-days: 1
          compression-level: 0
