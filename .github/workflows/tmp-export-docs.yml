name: Temporary documentation translation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  translate:
    if: github.head_ref == 'tmp-translate-docs-20260720-kai'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
      OMP_NUM_THREADS: "2"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reconstruct and verify plain-text inputs
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .translation-input/ru/matrix.md.part00 \
            .translation-input/ru/matrix.md.part01 \
            .translation-input/ru/matrix.md.part02 \
            .translation-input/ru/matrix.md.part03a \
            .translation-input/ru/matrix.md.part03b \
            .translation-input/ru/matrix.md.part04 \
            > .translation-input/ru/matrix.md

          python - <<'PY'
          from pathlib import Path
          import hashlib

          expected = {
              '.translation-input/ru/beta.md': (18606, 'c9bc8c457707868eb2ab700009f710c929a3f9528c7a0285b8e42d5cdf73d4ba'),
              '.translation-input/ru/matrix.md': (77425, 'aa317291d60765a9ddeec092679e6e07b5b9344010a84b18a0f9506d5390b795'),
              '.translation-input/ru/sources.md': (8559, '0bb10d8928a0c237ce43cb1d5291a2d60a00202ef8cb280e343d367502dca96d'),
              '.translation-input/en/beta.md': (14246, '480e12c74fab4f3def063e6c32c14745204977934111ceb638672b425f639eaf'),
              '.translation-input/en/index.md': (6351, 'cc6333dc8f3f71be9746005e02bfabbc971a972d09be7ab71bd1bba084ece85b'),
              '.translation-input/en/lab.md': (7795, '5821c9f45bfd912251bf5fa439f8b2a8b48bc929be57517c6afd05b931d07101'),
              '.translation-input/en/local-signals.md': (8244, '69496925028f65a3c50c9bd5357dac8b6282a37261080e58460cc25677f192ca'),
              '.translation-input/en/network-path.md': (8785, 'f60d10b59a527976b6ff891d54fb9bbd5dce6836d629cbb1b4dcd8b923da760b'),
              '.translation-input/en/profiles.md': (7015, 'f29998b7af730bcd24852f213e5c387cf5d072cd84f59a23835208fcfadb463f'),
              '.translation-input/en/root-integrity.md': (8609, 'e54f99280f4b0607fcf71fa3648351861ba1e323e57e13804cf4547f27fed25a'),
              '.translation-input/en/root-vpnhide.md': (12752, 'b9f84fba1565f72e38c82d6610219bf9a4bf57c56f5bf748bcba643983c053f4'),
              '.translation-input/en/threat-model.md': (7613, 'b9b5e0fa7135aab08a974e3cc70d11a5075f4937f21d21ae010478dfd7bc43b6'),
          }

          for raw_path, (size, digest) in expected.items():
              path = Path(raw_path)
              data = path.read_bytes()
              actual = hashlib.sha256(data).hexdigest()
              if len(data) != size or actual != digest:
                  raise SystemExit(
                      f'Input mismatch: {path}: size={len(data)} sha256={actual}; '
                      f'expected size={size} sha256={digest}'
                  )
              print(f'OK {path}: {size} bytes {digest}')

          en_names = sorted(p.name for p in Path('.translation-input/en').glob('*.md'))
          expected_en = sorted([
              'beta.md', 'index.md', 'lab.md', 'local-signals.md',
              'network-path.md', 'profiles.md', 'root-integrity.md',
              'root-vpnhide.md', 'threat-model.md',
          ])
          if en_names != expected_en:
              raise SystemExit(f'Unexpected English seed set: {en_names}')

          script_path = Path('.translation-input/translate_plain.py')
          script = script_path.read_text(encoding='utf-8')
          old = 'source_names = sorted(p.name for p in source.glob("*.md"))'
          new = 'source_names = sorted(p.name for p in (output_root / "en").glob("*.md"))'
          if old not in script:
              raise SystemExit('Expected validation expression was not found in translation runner')
          script = script.replace(old, new, 1)
          with script_path.open('w', encoding='utf-8', newline='\n') as handle:
              handle.write(script)
          print('Translation runner patched for seeded English file-set validation')
          PY

      - name: Install translation runtime
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install 'argostranslate==1.11.0'

      - name: Download and verify official language models
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p models

          download_model() {
            local filename="$1"
            local target="models/${filename}"
            local bases=(
              'https://data.argosopentech.com/argospm/v1'
              'https://argos-net.com/v1'
            )
            local base
            for base in "${bases[@]}"; do
              echo "Downloading ${filename} from ${base}"
              rm -f "${target}"
              if curl --fail --location --retry 5 --retry-all-errors \
                --connect-timeout 30 --max-time 1800 \
                "${base}/${filename}" --output "${target}"; then
                if python - "${target}" <<'PY'
          from pathlib import Path
          import sys
          import zipfile
          path = Path(sys.argv[1])
          valid = path.is_file() and path.stat().st_size > 20 * 1024 * 1024 and zipfile.is_zipfile(path)
          print(f'{path}: size={path.stat().st_size if path.exists() else 0}, zip={zipfile.is_zipfile(path) if path.exists() else False}')
          raise SystemExit(0 if valid else 1)
          PY
                then
                  return 0
                fi
              fi
            done
            echo "Unable to download a valid model: ${filename}" >&2
            return 1
          }

          download_model 'translate-ru_en-1_9.argosmodel'
          download_model 'translate-en_fa-1_5.argosmodel'
          download_model 'translate-en_zh-1_9.argosmodel'
          sha256sum models/*.argosmodel | sort | tee model-SHA256SUMS.txt

      - name: Translate and validate documentation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p workflow-output
          python .translation-input/translate_plain.py \
            --source .translation-input/ru \
            --seed .translation-input/en \
            --models models \
            --output workflow-output/translation-output.zip \
            2>&1 | tee workflow-output/translation.log
          cp model-SHA256SUMS.txt workflow-output/model-SHA256SUMS.txt

      - name: Upload translated documentation
        uses: actions/upload-artifact@v4
        with:
          name: translated-documentation-anti-detection
          path: |
            workflow-output/translation-output.zip
            workflow-output/localized-anti-detection/manifest.json
            workflow-output/translation.log
            workflow-output/model-SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
