name: Temporary high-quality documentation translation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  translate:
    if: github.head_ref == 'tmp-translate-docs-20260720-kai'
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      TOKENIZERS_PARALLELISM: "false"
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      HF_HUB_DISABLE_XET: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_HUB_DOWNLOAD_TIMEOUT: "1800"
      TRANSFORMERS_VERBOSITY: error
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reconstruct and verify plain-text inputs
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .translation-input/ru/matrix.md.part00 \
            .translation-input/ru/matrix.md.part01 \
            .translation-input/ru/matrix.md.part02 \
            .translation-input/ru/matrix.md.part03a \
            .translation-input/ru/matrix.md.part03b \
            .translation-input/ru/matrix.md.part04 \
            > .translation-input/ru/matrix.md

          cat > /tmp/input-SHA256SUMS.txt <<'EOF'
          c9bc8c457707868eb2ab700009f710c929a3f9528c7a0285b8e42d5cdf73d4ba  .translation-input/ru/beta.md
          aa317291d60765a9ddeec092679e6e07b5b9344010a84b18a0f9506d5390b795  .translation-input/ru/matrix.md
          0bb10d8928a0c237ce43cb1d5291a2d60a00202ef8cb280e343d367502dca96d  .translation-input/ru/sources.md
          480e12c74fab4f3def063e6c32c14745204977934111ceb638672b425f639eaf  .translation-input/en/beta.md
          cc6333dc8f3f71be9746005e02bfabbc971a972d09be7ab71bd1bba084ece85b  .translation-input/en/index.md
          5821c9f45bfd912251bf5fa439f8b2a8b48bc929be57517c6afd05b931d07101  .translation-input/en/lab.md
          69496925028f65a3c50c9bd5357dac8b6282a37261080e58460cc25677f192ca  .translation-input/en/local-signals.md
          f60d10b59a527976b6ff891d54fb9bbd5dce6836d629cbb1b4dcd8b923da760b  .translation-input/en/network-path.md
          f29998b7af730bcd24852f213e5c387cf5d072cd84f59a23835208fcfadb463f  .translation-input/en/profiles.md
          e54f99280f4b0607fcf71fa3648351861ba1e323e57e13804cf4547f27fed25a  .translation-input/en/root-integrity.md
          b9f84fba1565f72e38c82d6610219bf9a4bf57c56f5bf748bcba643983c053f4  .translation-input/en/root-vpnhide.md
          b9b5e0fa7135aab08a974e3cc70d11a5075f4937f21d21ae010478dfd7bc43b6  .translation-input/en/threat-model.md
          EOF
          sed -i 's/^          //' /tmp/input-SHA256SUMS.txt
          sha256sum --check --strict /tmp/input-SHA256SUMS.txt
          sed -i 's/use_fast=True/use_fast=False/' .translation-input/translate_nllb.py
          python -m py_compile .translation-input/translate_nllb.py

          python - <<'PY'
          from pathlib import Path
          names = sorted(p.name for p in Path('.translation-input/en').glob('*.md'))
          expected = sorted([
              'beta.md', 'index.md', 'lab.md', 'local-signals.md',
              'network-path.md', 'profiles.md', 'root-integrity.md',
              'root-vpnhide.md', 'threat-model.md',
          ])
          if names != expected:
              raise SystemExit(f'Unexpected English seed set: {names}')
          print('English seed set:', ', '.join(names))
          PY

      - name: Install pinned translation runtime
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://download.pytorch.org/whl/cpu \
            'torch==2.7.1'
          python -m pip install \
            'transformers==4.56.2' \
            'accelerate>=1.0,<2' \
            'sentencepiece>=0.2,<1' \
            'protobuf>=5,<7' \
            'safetensors>=0.4,<1'
          python -m pip freeze | sort | tee runtime-requirements.txt

      - name: Translate and validate documentation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p workflow-output
          python .translation-input/translate_nllb.py \
            --source .translation-input/ru \
            --seed .translation-input/en \
            --output workflow-output/translation-output.zip \
            --model facebook/nllb-200-distilled-600M \
            --revision cb65f9d79affdfe51b915cf26acf7e4cfd0fe471 \
            --batch-size 12 \
            2>&1 | tee workflow-output/translation.log
          cp runtime-requirements.txt workflow-output/runtime-requirements.txt

      - name: Record pinned model file hashes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > workflow-output/model-SHA256SUMS.txt
          from pathlib import Path
          import hashlib
          from huggingface_hub import snapshot_download

          root = Path(snapshot_download(
              repo_id='facebook/nllb-200-distilled-600M',
              revision='cb65f9d79affdfe51b915cf26acf7e4cfd0fe471',
              local_files_only=True,
          ))
          for path in sorted(root.iterdir()):
              if not path.is_file():
                  continue
              h = hashlib.sha256()
              with path.open('rb') as handle:
                  for block in iter(lambda: handle.read(1024 * 1024), b''):
                      h.update(block)
              print(f'{h.hexdigest()}  {path.name}')
          PY
          cat workflow-output/model-SHA256SUMS.txt

      - name: Upload translation output or diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: translated-documentation-nllb
          path: workflow-output/
          if-no-files-found: warn
          retention-days: 1
          compression-level: 0
