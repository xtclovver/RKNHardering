name: Temporary export documentation snapshot

on:
  push:
    branches:
      - tmp-translate-docs-20260720-kai

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Pack documentation
        run: |
          tar -czf repo-docs.tar.gz docs
          find docs -type f -print0 | sort -z | xargs -0 sha256sum > docs-SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: temporary-repo-docs-snapshot
          path: |
            repo-docs.tar.gz
            docs-SHA256SUMS.txt
          retention-days: 1
          compression-level: 0
